<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- ── Primary SEO ───────────────────────────────────── -->
  <title>Little Explorer Lab — Interactive Playground for Toddlers</title>
  <meta name="description" content="A safe, fullscreen interactive playground for curious toddlers aged 2–4. Touch anything and the world reacts — cars honk, rockets launch, stars burst. No ads, no text, fully offline.">
  <meta name="keywords" content="toddler app, kids interactive, educational game, preschool, learning through play, touch playground, 2 year old, 3 year old, 4 year old, cause and effect, offline kids app, no ads">
  <meta name="author" content="programmism">
  <link rel="canonical" href="https://programmism.github.io/little-explorer-lab/">

  <!-- ── Open Graph (Facebook, LinkedIn, Discord…) ───── -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://programmism.github.io/little-explorer-lab/">
  <meta property="og:title"       content="Little Explorer Lab — Interactive Playground for Toddlers">
  <meta property="og:description" content="Safe fullscreen playground for toddlers 2–4. Every touch causes a friendly reaction. No ads, no text, fully offline.">
  <meta property="og:image"       content="https://programmism.github.io/little-explorer-lab/og-image.svg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale"      content="en_US">
  <meta property="og:site_name"   content="Little Explorer Lab">

  <!-- ── Twitter Card ─────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Little Explorer Lab — Interactive Playground for Toddlers">
  <meta name="twitter:description" content="Safe fullscreen playground for toddlers 2–4. Every touch causes a friendly reaction. No ads, fully offline.">
  <meta name="twitter:image"       content="https://programmism.github.io/little-explorer-lab/og-image.svg">

  <!-- ── PWA ──────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#87CEEB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Explorer Lab">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <!-- ── Favicon ──────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- ── Structured data (Google) ─────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Little Explorer Lab",
    "url": "https://programmism.github.io/little-explorer-lab/",
    "description": "A safe, fullscreen interactive playground for curious toddlers aged 2–4.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires a modern browser with HTML5 Canvas support",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "audience": { "@type": "PeopleAudience", "suggestedMinAge": 2, "suggestedMaxAge": 6 }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #exit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #exit-overlay.visible {
      display: flex;
    }
    #exit-countdown {
      font-size: 120px;
      color: white;
      font-family: sans-serif;
      line-height: 1;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="exit-overlay">
    <div id="exit-countdown">3</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
