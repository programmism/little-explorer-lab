<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Little Explorer Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #exit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #exit-overlay.visible {
      display: flex;
    }
    #exit-countdown {
      font-size: 120px;
      color: white;
      font-family: sans-serif;
      line-height: 1;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="exit-overlay">
    <div id="exit-countdown">3</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
